version: "3.8"
services:
  dangro:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL?required}
      - CORS_ORIGIN=https://your-username.github.io
      - UPLOAD_DIR=/data/uploads
      - JWT_SECRET=${JWT_SECRET?required}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET?required}
    volumes:
      - dangro-data:/data
    restart: unless-stopped

volumes:
  dangro-data:
